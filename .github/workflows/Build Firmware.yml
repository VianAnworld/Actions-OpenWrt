name: Build Firmware

on:
  workflow_dispatch:
    inputs:
      ssh:
        description: 'SSH connection to Actions'
        required: false
        default: 'false'
#  schedule:
#    - cron: 0 14 * * *

env:
  REPO_URL: https://github.com/padavanonly/immortalwrt-mt798x
  REPO_BRANCH: openwrt-21.02
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: ax6000.config
  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part2.sh
  UPLOAD_BIN_DIR: false
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: true
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-20.04

    steps:
    - name: 检查项目分支
      uses: actions/checkout@v4.1.1

    - name: 初始化编译环境
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc
        sudo -E apt-get -qq update
        sudo -E apt-get -qq install $(cat ${GITHUB_WORKSPACE}/depends-ubuntu-2004)
        sudo -E apt-get -qq autoremove --purge
        sudo -E apt-get -qq clean
        sudo timedatectl set-timezone "$TZ"

    - name: 下载固件源码
      run: |
        df -hT $PWD
        git clone $REPO_URL -b $REPO_BRANCH ${GITHUB_WORKSPACE}/iwrt

    - name: 加载diy配置
      run: |
        [ -e $FEEDS_CONF ] && cp $FEEDS_CONF ${GITHUB_WORKSPACE}/iwrt/feeds.conf.default
        cp ${GITHUB_WORKSPACE}/$DIY_P1_SH ${GITHUB_WORKSPACE}/$DIY_P2_SH ${GITHUB_WORKSPACE}/iwrt/
        cd ${GITHUB_WORKSPACE}/iwrt
        chmod a+x $DIY_P1_SH $DIY_P2_SH
        ./scripts/feeds update -a
        ./$DIY_P1_SH
        ./$DIY_P2_SH
        ./scripts/feeds update -i
        ./scripts/feeds install -a

    - name: 下载安装包
      id: package
      run: |
        cd ${GITHUB_WORKSPACE}/iwrt
        cp -f ${GITHUB_WORKSPACE}/$CONFIG_FILE ${GITHUB_WORKSPACE}/iwrt/.config
        make defconfig
        make download -j8

    - name: 编译固件
      id: compile
      run: |
        cd ${GITHUB_WORKSPACE}/iwrt
        make -j$(nproc) || make -j1 V=s
        echo "status=success" >> "$GITHUB_OUTPUT"
        grep '^CONFIG_TARGET.*DEVICE.*=y' .config | sed -r 's/.*DEVICE_(.*)=y/\1/' > DEVICE_NAME
        [ -s DEVICE_NAME ] && echo "DEVICE_NAME=_$(cat DEVICE_NAME)" >> $GITHUB_ENV
        echo "FILE_DATE=_$(date +"%Y%m%d%H%M%S")" >> $GITHUB_ENV

    - name: 检查磁盘使用情况
      if: (!cancelled())
      run: df -hT

    - name: 压缩bin目录
      if: steps.compile.outputs.status == 'success' && !cancelled()
      run: |
        cd ${GITHUB_WORKSPACE}/iwrt/bin
        zip -r ${GITHUB_WORKSPACE}/iwrt/iwrt_bin${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}.zip *

    - name: 整理文件并重命名
      id: organize
      if: steps.compile.outputs.status == 'success' && env.UPLOAD_FIRMWARE == 'true' && !cancelled()
      run: |
        cd ${GITHUB_WORKSPACE}/iwrt/bin/targets/*/*
        rm -rf packages
        mv ${GITHUB_WORKSPACE}/iwrt/iwrt_bin${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}.zip ./
        echo "FIRMWARE=$PWD" >> $GITHUB_ENV
        echo "status=success" >> "$GITHUB_OUTPUT"

    - name: 上传固件到github
      uses: actions/upload-artifact@v4.3.3
      if: steps.organize.outputs.status == 'success' && !cancelled()
      with:
        name: iwrt_firmware${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
        path: ${{ env.FIRMWARE }}

    - name: 生成release标签
      id: tag
      if: steps.compile.outputs.status == 'success' && env.UPLOAD_RELEASE == 'true' && !cancelled()
      run: |
        ls ${{ env.FIRMWARE }}
        echo "release_tag=$(date +"%Y.%m.%d-%H%M%S")" >> "$GITHUB_OUTPUT"
        echo "status=success" >> "$GITHUB_OUTPUT"

    - name: 发布至release
      uses: ncipollo/release-action@v1.14.0
      if: steps.tag.outputs.status == 'success' && !cancelled()
      with:
        tag: ${{ steps.tag.outputs.release_tag }}
        body: ${{ steps.tag.outputs.release_tag }}
        artifacts: ${{ env.FIRMWARE }}/*

    - name: 删除工作流程运行
      uses: Mattraks/delete-workflow-runs@v2.0.6
      with:
        retain_days: 0
        keep_minimum_runs: 1

    - name: 删除旧版本
      uses: dev-drprasad/delete-older-releases@v0.3.3
      if: env.UPLOAD_RELEASE == 'true' && !cancelled()
      with:
        keep_latest: 30
        delete_tags: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
